<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
font-family:Roboto, Arial;
background:#f4f6f9;
margin:0;
}

.container{
width:400px;
margin:100px auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:15px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.links{
margin-top:20px;
}

.links a{
margin:0 10px;
text-decoration:none;
color:#3b82f6;
}

</style>

</head>

<body>

<div class="container">

<h2>Calculate BMI</h2>

<form action="/calculate" method="post">

<input type="number" step="0.1" name="weight" placeholder="Weight (kg)">

<button type="submit">Calculate BMI</button>

</form>

<div class="links">
<a href="/history">View History</a>
</div>

</div>

</body>
</html>
